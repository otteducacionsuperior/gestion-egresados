version: "3.9"

services:
  db:
    image: postgres:15
    container_name: egresados_db
    restart: always
    environment:
      POSTGRES_USER: egresados
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: egresados
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: egresados_backend
    restart: always
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://egresados:secret@db:5432/egresados
    volumes:
      - ./backend:/app

volumes:
  db_data:
